name: feishu
version: "1.0.0"
description: 飞书/Lark 平台对接
kind: channel
channel: feishu
configSchema:
  type: object
  additionalProperties: false
  properties:
    appId:
      type: string
    appSecret:
      type: string
    groupAllowFrom:
      type: array
      description: 允许的群聊列表（* 表示全部）
      items:
        type: string
    groupPolicy:
      type: string
      description: 群聊策略（open/allowlist/disabled）
      enum: [open, allowlist, disabled]
