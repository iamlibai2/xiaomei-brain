appId: com.xiaomei.brain.desktop
productName: xiaomei-brain
npmRebuild: false
msiProjectCreated: scripts/patch-msi-project.cjs
directories:
  output: release
files:
  - dist/**/*
  - package.json
asarUnpack:
  - node_modules/node-pty/**/*
extraResources:
  - from: runtime-stage/package
    to: runtime-package
    filter:
      - "**/*"
win:
  target: msi
  icon: assets/icon.png
  artifactName: "xiaomei-brain-${version}-setup.${ext}"
  signAndEditExecutable: false
msi:
  oneClick: true
  perMachine: false
  additionalLightArgs:
    - -sval
mac:
  target: dmg
  icon: assets/icon.icns
linux:
  target: AppImage
  icon: assets/icon.png
publish:
  - provider: generic
    url: https://releases.xiaomei-brain.com/updates/
