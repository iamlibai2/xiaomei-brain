{% extends "base.html" %}

{% block title %}{{ '编辑' if product else '添加' }}商品 - 库存管理系统{% endblock %}

{% block content %}
<div class="card fade-in">
    <div class="card-header">
        <h1 class="card-title">{{ '✏️ 编辑商品' if product else '➕ 添加新商品' }}</h1>
    </div>
    
    <form method="POST" id="productForm">
        <div class="form-group">
            <label for="name">商品名称 *</label>
            <input type="text" id="name" name="name" 
                   value="{{ product.name if product else '' }}" required
                   placeholder="请输入商品名称">
        </div>
        
        <div class="form-group">
            <label for="sku">SKU编号 *</label>
            <input type="text" id="sku" name="sku" 
                   value="{{ product.sku if product else '' }}" required
                   placeholder="请输入唯一SKU编号（如：SKU-001）">
        </div>
        
        <div class="form-group">
            <label for="category">商品分类</label>
            <input type="text" id="category" name="category" 
                   value="{{ product.category if product else '' }}"
                   placeholder="如：电子产品、服装、食品等">
        </div>
        
        <div class="form-group">
            <label for="description">商品描述</label>
            <textarea id="description" name="description" 
                      placeholder="请输入商品详细描述">{{ product.description if product else '' }}</textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
            <div class="form-group">
                <label for="quantity">当前库存 *</label>
                <input type="number" id="quantity" name="quantity" 
                       value="{{ product.quantity if product else 0 }}" required min="0"
                       placeholder="0">
            </div>
            
            <div class="form-group">
                <label for="min_stock">库存预警值 *</label>
                <input type="number" id="min_stock" name="min_stock" 
                       value="{{ product.min_stock if product else 10 }}" required min="0"
                       placeholder="当库存低于此值时提醒">
            </div>
            
            <div class="form-group">
                <label for="unit_price">单价（元）*</label>
                <input type="number" id="unit_price" name="unit_price" 
                       value="{{ product.unit_price if product else 0 }}" required min="0" step="0.01"
                       placeholder="0.00">
            </div>
            
            <div class="form-group">
                <label for="supplier">供应商</label>
                <input type="text" id="supplier" name="supplier" 
                       value="{{ product.supplier if product else '' }}"
                       placeholder="请输入供应商名称">
            </div>
        </div>
        
        <div class="form-group" style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-success" style="flex: 1;">
                {{ '💾 保存修改' if product else '➕ 添加商品' }}
            </button>
            <a href="{{ url_for('product_list') }}" class="btn btn-secondary" style="flex: 1; text-align: center;">
                ← 返回列表
            </a>
        </div>
    </form>
</div>

<script>
// 表单验证
document.getElementById('productForm').addEventListener('submit', function(e) {
    const name = document.getElementById('name').value.trim();
    const sku = document.getElementById('sku').value.trim();
    
    if (!name || !sku) {
        e.preventDefault();
        alert('请填写必填项：商品名称和SKU编号');
        return false;
    }
    
    const quantity = parseInt(document.getElementById('quantity').value);
    const minStock = parseInt(document.getElementById('min_stock').value);
    
    if (quantity < 0 || minStock < 0) {
        e.preventDefault();
        alert('库存数量不能为负数');
        return false;
    }
    
    return true;
});
</script>
{% endblock %}
